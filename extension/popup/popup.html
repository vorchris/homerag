<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo-small">home</div>
    <div class="logo">RAG</div>
    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="status-text">checking</span>
    </div>
  </div>

  <div class="row">
    <span class="label">enabled</span>
    <label class="toggle">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <span class="label">collection</span>
    <select id="collection"></select>
  </div>

  <div class="row">
    <span class="label">top-k</span>
    <input type="number" id="topK" min="1" max="10" value="3">
  </div>

  <div class="row">
    <span class="label">threshold</span>
    <input type="number" id="threshold" min="0" max="1" step="0.05" value="0.5">
  </div>

  <div class="row">
    <span class="label">api url</span>
    <input type="text" id="apiUrl" placeholder="http://localhost:8000">
  </div>

  <button id="save">save</button>
  <div id="saved-msg" class="saved-msg"></div>

  <script src="popup.js"></script>
</body>
</html>
