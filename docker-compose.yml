services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: homerag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: homerag-backend
    ports:
      - "8000:8000"
    volumes:
      - file_store:/app/storage
      - db_data:/app/data
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DB_PATH=/app/data/homerag.db
      - STORAGE_PATH=/app/storage
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: homerag-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
  file_store:
  db_data: